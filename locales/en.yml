cookiePolicy:
  title: Cookie Policy
  content: |
    # Cookie Policy

    **Last updated:** January 2026

    This Cookie Policy explains what cookies are, how and why Armytool (the "Service") uses them, and what choices you have. We have tried to keep this document plain and practical. If anything is unclear, please reach out via our [contact form](/contact).

    By using the Service, you consent to the use of cookies in accordance with this policy. You can withdraw or modify your consent at any time by following the instructions in Section 6 below.

    ## 1. What Are Cookies?

    Cookies are small text files that are placed on your computer or mobile device when you visit a website. They are widely used to make websites work more efficiently and to provide information to website operators. Cookies set by the website you are visiting are called "first-party cookies." Cookies set by parties other than the website you are visiting are called "third-party cookies."

    In addition to cookies, the Service may use similar technologies such as:

    * **Local storage** — small data items stored by your browser that persist across sessions.
    * **Session storage** — similar to local storage but cleared when you close your browser.
    * **Web beacons / pixels** — small transparent images embedded in pages or emails that allow the operator to count visits or recognize access.
    * **IndexedDB** — a more capable client-side store used by some web applications.

    For simplicity, this policy refers to all of these technologies collectively as "cookies."

    ## 2. Why We Use Cookies

    We use cookies for a small number of clearly defined purposes. We do not use cookies to track you across unrelated websites, build advertising profiles, or sell your behavior to data brokers. Specifically, we use cookies to:

    ### 2.1 Remember Your Preferences

    When you choose a theme (light, dark, or system) or a language, we store that preference in a cookie or in local storage so that the choice persists on subsequent visits. This is necessary for the Service to feel responsive to your settings.

    ### 2.2 Make the Service Work

    Some cookies are strictly necessary to deliver the Service. For example, we may use a cookie to remember whether you have dismissed a banner, accepted a prompt, or completed a one-time action. Without these cookies, parts of the Service may not function correctly.

    ### 2.3 Measure Aggregate Usage

    We use privacy-respecting analytics to understand which tools are popular, where users encounter errors, and how the Service performs. Where possible, we prefer analytics solutions that do not require cookies. Where cookies are used, we configure them to minimize identifiability (for example, by stripping the last octet of IP addresses).

    ### 2.4 Support Advertising

    Because the Service is free, we display advertising served by Google AdSense. AdSense uses cookies to:

    * Deliver ads that are relevant to you and your interests.
    * Limit the number of times you see the same ad.
    * Measure the effectiveness of ads.
    * Detect and prevent fraud.

    You can opt out of personalized advertising by visiting [Google Ads Settings](https://www.google.com/settings/ads).

    ### 2.5 Support the Installable App

    If you install Armytool as a Progressive Web App (PWA), your browser may store a small amount of data locally to enable offline functionality and to remember that the app is installed.

    ## 3. Types of Cookies We Use

    We classify the cookies we use into the following categories:

    * **Strictly necessary cookies** — required for the Service to operate. These cannot be disabled.
    * **Preference cookies** — remember your choices such as theme and language.
    * **Analytics cookies** — measure aggregate, anonymized usage.
    * **Advertising cookies** — set by Google AdSense to support ad delivery.

    The exact list of cookies, their providers, and their lifespans can change as we add, remove, or replace services. The most up-to-date inventory is maintained in our [privacy policy](/privacy-policy).

    ## 4. Third-Party Cookies

    Some cookies on the Service are set by third parties. The most important third parties are:

    * **Google AdSense** — for advertising. See Google's [privacy policy](https://policies.google.com/privacy) and [ads policy](https://policies.google.com/technologies/ads) for details.
    * **Analytics providers** — for aggregate usage measurement. We prefer providers that do not require consent, but where they do, we configure them to operate without personal identifiers.

    We do not control how third parties use cookies set by their services. Their use is governed by their own privacy and cookie policies.

    ## 5. Cookies and Personal Data

    Most of the cookies we use do not, by themselves, identify you personally. They may, however, be considered personal data under laws such as the GDPR when combined with other data. We treat any data that could be used to identify you as personal data, regardless of the technical definition, and we protect it accordingly.

    ## 6. Your Choices and Controls

    You have several ways to control or limit cookies:

    ### 6.1 Browser Settings

    Most browsers allow you to:

    * See what cookies are stored and delete them individually or in bulk.
    * Block third-party cookies.
    * Block all cookies from specific sites.
    * Block all cookies from being set.
    * Clear all stored data when you close the browser.

    Note that blocking all cookies may break parts of the Service or make it less convenient to use.

    ### 6.2 Opt Out of Personalized Advertising

    * Visit [Google Ads Settings](https://www.google.com/settings/ads) to opt out of personalized ads from Google.
    * Visit [www.aboutads.info](https://www.aboutads.info) to opt out of personalized ads from many participating advertisers.
    * Use the [DAA Webchoices tool](https://optout.aboutads.info) to manage interest-based advertising preferences.

    ### 6.3 Do Not Track

    Some browsers offer a "Do Not Track" (DNT) feature. We honor DNT signals by disabling non-essential cookies and analytics where technically feasible.

    ### 6.4 Clear Your Data

    You can clear cookies and site data stored by the Service at any time through your browser settings. After clearing, the Service will behave as if it is your first visit, and your preferences will need to be set again.

    ## 7. Changes to This Cookie Policy

    We may update this Cookie Policy from time to time to reflect changes in technology, regulation, or our practices. When we do, we will revise the "Last updated" date at the top of this page. If the changes are material, we will display a more prominent notice.

    ## 8. Contact

    If you have questions about this Cookie Policy, please contact us via the [contact form](/contact). We aim to respond within 30 days.
