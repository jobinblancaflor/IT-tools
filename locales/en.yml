    * Defects in the Service will be corrected.

    Some jurisdictions do not allow the exclusion of certain warranties. In such jurisdictions, the exclusions above apply to the maximum extent permitted by law.

    ## 3. Tool Output Disclaimer

    Many of the tools available on the Service produce output based on algorithms, heuristics, validations, or transformations. Examples include password strength analyzers, JSON validators, regex testers, and hash generators. While we strive to make these tools correct, edge cases, library limitations, and evolving standards mean that the output may be incorrect, incomplete, or unsuitable for production use.

    **Always verify the output of any tool before relying on it for security-critical, business-critical, or production purposes.** Do not use any tool on the Service as the sole basis for decisions that could result in harm to people, data loss, financial loss, or legal liability.

