contact:
  title: Contact Us
  description: Have a question, suggestion, or found a bug? We'd love to hear from you!
  content: |
    # Contact Us

    **Last updated:** January 2026

    We love hearing from the people who use Armytool. Whether you are a developer integrating one of our tools into your workflow, an IT professional troubleshooting a security problem, an everyday user who just discovered our site, or a researcher digging into how privacy-first tooling works in practice, your feedback shapes the direction of the platform.

    This page explains the best ways to reach us, what to expect when you do, and what to do if you need to report something urgent like a security vulnerability.

    ## 1. The Best Way to Reach Us

    The fastest and most reliable way to get in touch is through our **Google Form**, which you can open using the button below. The form is short, mobile-friendly, and routes your message to the right person on our team. We aim to respond to all non-urgent messages within **five business days**, and urgent security issues within **two business days**.

    <a href="https://forms.gle/RTqr2ZUrKosiQ4sr8" target="_blank" rel="noopener noreferrer">Open the Contact Form</a>

    The form lets you select the category of your message — bug report, feature request, general question, partnership inquiry, or security disclosure. Picking the right category helps us respond faster.

    ## 2. What to Include in Your Message

    To help us help you, please include as much of the following information as makes sense for your request:

    * **A clear, specific subject** — "Password strength analyzer returns NaN for emoji inputs" is far more useful than "Bug in tool."
    * **Steps to reproduce** — for bug reports, the exact sequence of actions that led to the issue.
    * **Expected vs. actual behavior** — what you thought would happen and what actually happened.
    * **Browser, operating system, and device** — for example, "Chrome 121 on Windows 11, desktop" or "Safari on iOS 17, iPhone 14."
    * **Screenshots or screen recordings** — when relevant. A short Loom, GIF, or screenshot can replace paragraphs of text.
    * **Tool URL** — the specific page you were using. Many of our tools have unique URLs that tell us which exact feature is involved.
    * **For feature requests** — the problem you are trying to solve, not just the solution you have in mind. The solution you suggest is a great starting point, but explaining the underlying need helps us design the right feature.

    The more context you provide, the less back-and-forth is needed before we can take action.

    ## 3. Bug Reports

    If you have found a bug, we want to know about it. Bugs in privacy-related tools are especially important to us, because users trust us with sensitive data. When reporting a bug, please:

    1. Check the relevant tool's page to see if the issue is mentioned in the FAQ or known issues section.
    2. Test in a different browser, if possible, to help us determine whether the issue is browser-specific.
    3. Try in an incognito/private window to rule out interference from browser extensions.
    4. Provide the steps to reproduce and the exact input you used, being careful not to share real secrets, passwords, or personal data.

    If a bug is causing data loss, security exposure, or preventing you from completing a critical task, please mark your message as **urgent** in the form.

    ## 4. Feature Requests

    We maintain a public roadmap and prioritize new tools based on community demand. If you would like to see a new tool added to Armytool, please tell us:

    * What you are trying to accomplish.
    * What tools you currently use for the task, and what is missing in them.
    * How often you would use the new tool.
    * Whether you would be willing to help test an early version.

    Suggestions that solve real problems for many users tend to move to the top of the backlog. Suggestions that solve a problem for one user in a very specific environment are still valuable, but may be better served by linking to a third-party tool.

    ## 5. Security Disclosures

    If you have discovered a security vulnerability in Armytool, please report it to us **privately** through the contact form marked as "Security Disclosure." We take all security reports seriously, and we commit to:

    * **Acknowledging** your report within two business days.
    * **Investigating** the issue and providing an initial assessment within five business days.
    * **Fixing** confirmed vulnerabilities as quickly as is reasonably possible, with a target of 30 days for high-severity issues.
    * **Crediting** you in our security acknowledgements page, unless you prefer to remain anonymous.

    Please do not publicly disclose the vulnerability until we have had a chance to investigate and release a fix. We are happy to coordinate a disclosure timeline that works for both parties.

    ## 6. Partnership and Business Inquiries

    If you are interested in partnership opportunities, sponsored content, integrations, or other business-related inquiries, please select "Partnership Inquiry" in the contact form. We are open to conversations that align with our privacy-first mission. We do not currently sell sponsored tool placements or paid reviews, and we do not plan to do so in the future.

    ## 7. Languages We Speak

    Our team is small, and English is our primary working language. We can read and respond to messages in English fluently. We are happy to use machine translation to assist with other languages, but for nuanced or technical issues, an English message is most likely to get a fast and accurate response.

    The website itself is translated into a number of languages via the language selector. If you spot a translation error, please report it through the form — we rely on community help to keep the translations accurate.

    ## 8. What We Will Never Do

    We want to set clear expectations:

    * We will never ask for your password, API key, or other secrets in a contact form or email.
    * We will never charge you to use the core tools on the Service. The platform is free and supported by non-intrusive advertising.
    * We will never sell your contact information to third parties.
    * We will never share your message publicly without your explicit consent.

    If you receive a message that appears to be from Armytool and asks for any of the above, please treat it as suspicious and report it to us.

    ## 9. Response Times

    We are a small team. Typical response times are:

    * **Security disclosures** — within 2 business days.
    * **Bug reports affecting functionality** — within 5 business days.
    * **Feature requests** — within 5 business days for acknowledgement, longer for substantive replies.
    * **General questions** — within 5 business days.
    * **Partnership inquiries** — within 10 business days.

    If your request is time-sensitive, please indicate the urgency in your message. We try to be flexible and will move urgent items up the queue.

    ## 10. Other Ways to Stay in Touch

    Beyond direct contact, you can stay updated through:

    * Our **blog**, where we publish guides, security writeups, and platform updates.
    * Our **RSS feed**, for those who prefer to follow along in a feed reader.
    * The **about page**, where we share our background and the philosophy behind the platform.

    Thank you for using Armytool. Every message we receive helps us build a better, more private, more useful set of tools for the community.
privacyPolicy:
  title: Privacy Policy
  content: |
    # Privacy Policy

    **Last updated:** January 2026

    At Armytool, privacy is not a feature we bolted on after the fact. It is the foundational design principle that shapes every tool, every page, and every line of code we publish. This Privacy Policy explains in clear, plain language what data we collect, what data we never collect, how we handle the limited information that does flow through our service, and what rights you have over any information that touches our systems.

    We encourage you to read this document end to end. It is intentionally thorough because we believe informed users are empowered users. If anything in this policy is unclear, please reach out via our contact form and we will gladly clarify.

    ## 1. Introduction and Scope

    This Privacy Policy applies to the website located at **www.armytool.site** (the "Site"), all subdomains, and any related services operated by Armytool (collectively, the "Service"). By accessing or using the Service, you agree to the terms set out in this policy.

    Armytool is a privacy-first utility platform for developers, IT professionals, and everyday users. Most of our tools run entirely inside your browser. This means the data you process — passwords, JSON, tokens, files, images, text — generally never leaves your device. Where this is true, there is nothing for us to collect, store, or hand over to third parties. Where it is not true, we tell you explicitly below.

    This policy is written to comply with the General Data Protection Regulation (GDPR), the California Consumer Privacy Act (CCPA/CPRA), and equivalent privacy frameworks around the world. If you are located in the European Economic Area, the United Kingdom, or California, you have specific rights summarized in Section 9.

    ## 2. Information We Do Not Collect

    We want to start with what we **do not** do, because most privacy policies bury this information:

    * **We do not log or store the data you process in our tools.** Whether you generate a token, validate a JWT, format a JSON document, hash a password, or convert an image, the input and output remain in your browser. No copies are kept on our servers, in logs, or in backups.
    * **We do not require an account.** There is no registration, no email capture, no profile, and no password tied to your use of Armytool. Anonymous use is the default.
    * **We do not sell your data.** Period. We have never sold user data, and the design of the platform makes it impossible to do so for the vast majority of our tools.

    ## 3. Information We Do Collect

    Despite the privacy-first design, a small amount of information is necessarily collected to operate the Service:

    ### 3.1 Server Logs

    Like virtually every website on the internet, our hosting provider records basic request information when your browser fetches a page. This typically includes your IP address, the requested URL, the response status code, the user-agent string, and a timestamp. These logs are kept for a maximum of 30 days and are used solely for security monitoring, abuse prevention, and capacity planning. They are never linked to a user profile because we have no user profiles.

    ### 3.2 Cookies and Local Storage

    We use a minimal set of cookies and local storage entries to remember your preferences (such as dark mode and language selection) and to support the optional installable app feature. Section 3 covers cookies in detail.

    ### 3.3 Third-Party Advertising

    We display non-personalized advertisements served by **Google AdSense** to support the free availability of the Service. Google may set cookies or read identifiers from your browser to deliver these ads, measure their performance, and prevent fraud. You can opt out of personalized advertising at any time by visiting [Google Ads Settings](https://www.google.com/settings/ads).

    ### 3.4 Third-Party Analytics

    We use privacy-respecting analytics to understand which tools are popular, which pages load slowly, and where users encounter errors. We prefer tools that do not require consent banners, but if the analytics provider we use does collect personal data, we configure it to anonymize IP addresses and disable advertising features.

    ## 4. Client-Side Processing

    The single most important architectural decision we have made is to keep the vast majority of our tools **client-side only**. This means:

    * Your passwords never reach our servers.
    * Your tokens never reach our servers.
    * Your personal documents never reach our servers.
    * Your IP addresses, credit card numbers, API keys, and any other sensitive input never reach our servers.

    The trade-off is that some tools that require server resources (for example, a tool that needs to call an external API to validate a phone number) will, by necessity, send the relevant data to that third-party API. In every such case, we surface this fact clearly inside the tool itself before the request is made, and we link to the third party's privacy policy.

    ## 5. Children's Privacy

    Armytool is intended for users aged 13 and over. We do not knowingly collect personal data from children under 13. If you believe a child has provided personal data to us, please contact us and we will delete it promptly.

    ## 6. International Data Transfers

    Our hosting provider operates data centers in multiple regions. Depending on your location, your requests may be served from a region outside your home jurisdiction. By using the Service, you acknowledge that your information may be transferred to, stored in, and processed in countries other than your own. We rely on standard contractual clauses and equivalent legal mechanisms where required.

    ## 7. Data Security

    We implement industry-standard technical and organizational measures to protect the limited data we do collect. These include HTTPS everywhere, principle-of-least-privilege access controls, regular dependency audits, and a small team with administrative access. No system is perfectly secure, but we design ours to fail closed: even if a log file leaked, it would not contain the data you processed in our tools, because we never receive that data in the first place.

    ## 8. Third-Party Services

    The Service relies on a small number of third-party providers to function. Each one has been selected with privacy in mind:

    * **Hosting provider** — serves the Site over HTTPS.
    * **Google AdSense** — displays advertisements.
    * **Analytics provider** — measures aggregate usage.
    * **CDN** — delivers static assets quickly worldwide.

    Each provider processes data according to its own privacy policy. We encourage you to review those policies.

    ## 9. Your Rights

    Depending on where you live, you may have the right to:

    * Request access to the personal data we hold about you (typically: nothing).
    * Request correction of inaccurate data.
    * Request deletion of your data.
    * Object to processing or withdraw consent.
    * Lodge a complaint with a supervisory authority.

    Because we collect so little, most of these requests will result in a confirmation that there is no data to provide or delete. To exercise any of these rights, please contact us via the form linked in the footer.

    ## 10. Changes to This Policy

    We may update this Privacy Policy from time to time. When we do, we will revise the "Last updated" date at the top of this page. If the changes are material, we will announce them more visibly through a banner on the Site. Continued use of the Service after changes take effect constitutes acceptance of the updated policy.

    ## 11. Contact

