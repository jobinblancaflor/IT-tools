about:
  content: |
    # About the Developer

    ### Building Secure, Practical Tools for Developers

    I'm **Jobin Blancaflor**, a web developer and security researcher with more than 12 years of experience working across software development, cybersecurity, and automation. Armytool was created from a simple need: having reliable, privacy-focused utilities available in one place without relying on online services that collect or store user data.

    Throughout my career, I've worked extensively in DevSecOps, modern web development, and workflow automation. Armytool reflects the same principles I apply in professional projects—performance, security, transparency, and user trust.

    ## Background and Areas of Focus

    ### Full-Stack Development

    I design and build modern web applications using technologies such as Vue and TypeScript. Rather than being a collection of isolated scripts, Armytool is structured as a fast, scalable platform designed to provide a smooth experience across devices and browsers.

    ### Automation and Process Optimization

    Automation has always been a major part of my work. I enjoy creating systems that remove repetitive tasks, reduce manual errors, and improve efficiency. Whether through custom automation workflows or low-code solutions, my goal is always to simplify complex processes.

    ### Security-First Engineering

    Security is a foundational part of every tool on this platform. From secure implementation practices to local browser-based processing, Armytool is built with the same standards I use when developing enterprise applications. Features such as client-side data handling help ensure that sensitive information remains under your control.

    ## Why Armytool Exists

    Many free online tools offer convenience, but often at the cost of privacy. In many cases, uploaded files, passwords, tokens, or other sensitive data pass through external servers without users fully understanding how that information is handled.

    Armytool was built as an alternative—a collection of utilities designed around privacy and transparency.

    * **Client-Side Processing:** Data is processed directly in your browser whenever possible, reducing exposure to third-party systems.
    * **Open and Verifiable:** The project's logic is transparent and can be reviewed by anyone.
    * **No Data Storage:** Information entered into the tools is not stored or retained.

    My goal is straightforward: provide useful tools that developers, IT professionals, and everyday users can trust while helping promote a safer and more privacy-conscious web.

