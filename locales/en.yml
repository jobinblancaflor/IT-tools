    ## 2. "As Is" and "As Available"

    The Service is provided on an "AS IS" and "AS AVAILABLE" basis without any representations, warranties, or conditions of any kind, express or implied, including, but not limited to, implied warranties or conditions of merchantability, fitness for a particular purpose, non-infringement, or accuracy.

